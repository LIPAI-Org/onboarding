    <title>{{ page.title | default: site.title }}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

        <footer>
            <p>&copy; 2026 Laboratório Interdisciplinar de Processamento e Análise de Imagens (LIPAI) - UFU</p>
